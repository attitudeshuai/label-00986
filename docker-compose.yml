services:
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: music-player-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
